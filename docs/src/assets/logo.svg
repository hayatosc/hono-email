<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- ===== Balloon: faceted, Hono-logo style, no strokes ===== -->

  <!-- Left facet (darkest) -->
  <path d="M64 6
           C 48 6, 30 20, 30 42
           C 30 58, 42 72, 52 80
           L 58 80
           C 50 66, 46 54, 46 40
           C 46 24, 54 10, 64 6 Z"
        fill="#C93607"/>

  <!-- Right facet (dark) -->
  <path d="M64 6
           C 80 6, 98 20, 98 42
           C 98 58, 86 72, 76 80
           L 70 80
           C 78 66, 82 54, 82 40
           C 82 24, 74 10, 64 6 Z"
        fill="#E8420A"/>

  <!-- Center facet (light, highlight) -->
  <path d="M64 6
           C 54 10, 46 24, 46 40
           C 46 54, 50 66, 58 80
           L 70 80
           C 78 66, 82 54, 82 40
           C 82 24, 74 10, 64 6 Z"
        fill="#FF7A1A"/>

  <!-- Skirt: connects balloon mouth to the envelope -->
  <path d="M53 80 L75 80 L71 90 L57 90 Z" fill="#A32B05"/>

  <!-- ===== Basket: envelope, flat, no strokes ===== -->
  <path d="M48 90
           H80
           A4 4 0 0 1 84 94
           V112
           A4 4 0 0 1 80 116
           H48
           A4 4 0 0 1 44 112
           V94
           A4 4 0 0 1 48 90 Z"
        fill="#FF7A1A"/>

  <!-- Flap: darker facet triangle -->
  <path d="M45 91.5 L64 105 L83 91.5 A4 4 0 0 0 80 90 H48 A4 4 0 0 0 45 91.5 Z"
        fill="#C93607"/>
</svg>
