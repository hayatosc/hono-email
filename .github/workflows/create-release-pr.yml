name: Create Release PR

on:
  push:
    branches:
      - main

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Check if version changed
        id: version
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")

          # Get the previous commit's version
          OLD_VERSION=$(git show HEAD~1:package.json 2>/dev/null \
            | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).version))" \
            || echo "")

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "old_version=$OLD_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$NEW_VERSION" != "$OLD_VERSION" ] && [ -n "$OLD_VERSION" ]; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $OLD_VERSION -> $NEW_VERSION"
          else
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
            echo "Version not changed (new: $NEW_VERSION, old: $OLD_VERSION)"
          fi

      - name: Generate CHANGELOG entry
        if: steps.version.outputs.version_changed == 'true'
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          OLD_VERSION="${{ steps.version.outputs.old_version }}"
          DATE=$(date -u +%Y-%m-%d)

          # Prefer the previous release tag. If tags are missing, fall back to
          # the commit that added the previous CHANGELOG entry, then to the
          # package.json commit for the previous version. Never fall back to all
          # repository history for an existing project.
          BASE_REF=""
          if git rev-parse --verify --quiet "v${OLD_VERSION}^{commit}" >/dev/null; then
            BASE_REF="v${OLD_VERSION}"
          elif [ -f CHANGELOG.md ]; then
            BASE_REF=$(git log --format=%H -G "^## \\[${OLD_VERSION}\\]" -- CHANGELOG.md | head -1)
          fi

          if [ -z "$BASE_REF" ]; then
            BASE_REF=$(
              git log --format=%H -- package.json | while read -r commit; do
                COMMIT_VERSION=$(git show "${commit}:package.json" 2>/dev/null \
                  | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).version))" \
                  || echo "")

                if [ "$COMMIT_VERSION" = "$OLD_VERSION" ]; then
                  echo "$commit"
                  break
                fi
              done
            )
          fi

          if [ -n "$BASE_REF" ]; then
            RAW_COMMITS=$(git log --first-parent "${BASE_REF}..HEAD" --pretty=format:"%s")
          else
            RAW_COMMITS=""
          fi

          COMMITS=$(printf '%s\n' "$RAW_COMMITS" | awk -v version="$VERSION" '
            $0 == "" { next }
            $0 == version || $0 == "v" version { next }
            $0 ~ "^chore(\\([^)]*\\))?: update CHANGELOG\\.md for v?" version "$" { next }
            $0 ~ "^Release/v[0-9]" { next }
            { print "- " $0 }
          ')

          if [ -z "$COMMITS" ]; then
            COMMITS="- Version bump to ${VERSION}"
          fi

          # Build the new entry
          {
            echo "## [${VERSION}] - ${DATE}"
            echo ""
            echo "${COMMITS}"
            echo ""
          } > /tmp/new_entry.md

          # Prepend to CHANGELOG.md (create it if it does not exist)
          if [ -f CHANGELOG.md ]; then
            if head -1 CHANGELOG.md | grep -q "^#"; then
              head -1 CHANGELOG.md > /tmp/new_changelog.md
              echo "" >> /tmp/new_changelog.md
              cat /tmp/new_entry.md >> /tmp/new_changelog.md
              tail -n +2 CHANGELOG.md >> /tmp/new_changelog.md
            else
              cat /tmp/new_entry.md CHANGELOG.md > /tmp/new_changelog.md
            fi
          else
            {
              echo "# Changelog"
              echo ""
              cat /tmp/new_entry.md
            } > /tmp/new_changelog.md
          fi

          cp /tmp/new_changelog.md CHANGELOG.md

      - name: Create release branch and open PR
        if: steps.version.outputs.version_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          BRANCH="release/v${VERSION}"

          # Skip if branch already exists (e.g. re-push with the same version)
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH already exists, skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add CHANGELOG.md
          git commit -m "chore: update CHANGELOG.md for v${VERSION}"
          git push origin "$BRANCH"

          # Extract the new entry from CHANGELOG.md for the PR body
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md | sed '/^[[:space:]]*$/d')

          gh pr create \
            --title "Release v${VERSION}" \
            --body "## Release v${VERSION}

          This PR adds the CHANGELOG.md entry for version \`${VERSION}\`.
          Merging this PR will trigger an npm publish and a GitHub Release.

          ### Changes

          ${NOTES}" \
            --base main \
            --head "$BRANCH"
