name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d

      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Check format
        run: bun run format:check

  changeset:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Check for changeset
        run: |
          if ! git diff --name-only origin/main...HEAD | grep -q "^\.changeset/"; then
            echo "::warning::No changeset found. If this PR changes a package, run 'bun run changeset' to add one."
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d

      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050
        id: filter
        with:
          base: main
          filters: |
            node:
              - 'src/adapter/platform/node/**'
              - 'src/adapter/smtp/**'
              - 'src/adapter/index.ts'
              - 'src/index.ts'
              - 'package.json'
              - 'bun.lock'
              - 'runtime-tests/node/**'
            deno:
              - 'src/adapter/platform/deno/**'
              - 'src/adapter/smtp/**'
              - 'src/adapter/index.ts'
              - 'src/index.ts'
              - 'package.json'
              - 'bun.lock'
              - 'runtime-tests/deno/**'
            bun:
              - 'src/adapter/platform/bun/**'
              - 'src/adapter/smtp/**'
              - 'src/adapter/index.ts'
              - 'src/index.ts'
              - 'package.json'
              - 'bun.lock'
              - 'runtime-tests/bun/**'
            cloudflare:
              - 'src/adapter/platform/cloudflare/**'
              - 'src/adapter/cloudflare/**'
              - 'src/adapter/smtp/**'
              - 'src/adapter/index.ts'
              - 'src/index.ts'
              - 'package.json'
              - 'bun.lock'
              - 'runtime-tests/cloudflare/**'
            docs:
              - 'docs/**'

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build packages
        run: bun run build

      - name: Astro Check
        if: steps.filter.outputs.docs == 'true'
        run: bun run --filter 'hono-email-docs' check

      - name: Astro Build
        if: steps.filter.outputs.docs == 'true'
        run: bun run --filter 'hono-email-docs' build

      - name: Runtime Test (Node)
        if: steps.filter.outputs.node == 'true'
        run: bun run test:runtime:node

      - name: Runtime Test (Deno)
        if: steps.filter.outputs.deno == 'true'
        run: bun run test:runtime:deno

      - name: Runtime Test (Bun)
        if: steps.filter.outputs.bun == 'true'
        run: bun run test:runtime:bun

      - name: Runtime Test (Cloudflare)
        if: steps.filter.outputs.cloudflare == 'true'
        run: bun run test:runtime:cloudflare
