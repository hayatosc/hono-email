name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Check format
        run: bun run format:check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            node:
              - 'src/adapter/platform/node/**'
              - 'src/adapter/smtp/**'
              - 'src/adapter/index.ts'
              - 'src/index.ts'
              - 'package.json'
              - 'bun.lock'
              - 'runtime-tests/node/**'
            deno:
              - 'src/adapter/platform/deno/**'
              - 'src/adapter/smtp/**'
              - 'src/adapter/index.ts'
              - 'src/index.ts'
              - 'package.json'
              - 'bun.lock'
              - 'runtime-tests/deno/**'
            bun:
              - 'src/adapter/platform/bun/**'
              - 'src/adapter/smtp/**'
              - 'src/adapter/index.ts'
              - 'src/index.ts'
              - 'package.json'
              - 'bun.lock'
              - 'runtime-tests/bun/**'
            cloudflare:
              - 'src/adapter/platform/cloudflare/**'
              - 'src/adapter/cloudflare/**'
              - 'src/adapter/smtp/**'
              - 'src/adapter/index.ts'
              - 'src/index.ts'
              - 'package.json'
              - 'bun.lock'
              - 'runtime-tests/cloudflare/**'

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Runtime Test (Node)
        if: steps.filter.outputs.node == 'true'
        run: bun run test:runtime:node

      - name: Runtime Test (Deno)
        if: steps.filter.outputs.deno == 'true'
        run: bun run test:runtime:deno

      - name: Runtime Test (Bun)
        if: steps.filter.outputs.bun == 'true'
        run: bun run test:runtime:bun

      - name: Runtime Test (Cloudflare)
        if: steps.filter.outputs.cloudflare == 'true'
        run: bun run test:runtime:cloudflare

      - name: Build
        run: bun run build
