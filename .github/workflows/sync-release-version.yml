name: sync-release-version

on:
  pull_request:
    types: [opened, edited]

jobs:
  sync:
    if: startsWith(github.event.pull_request.head.ref, 'release-please--')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Sync version from PR title
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          # "release 1.2.3" のような形式からバージョン番号を抽出
          VERSION=$(echo "$TITLE" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          
          if [ -z "$VERSION" ]; then
            echo "No version found in title"
            exit 0
          fi
          
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          
          if [ "$CURRENT_VERSION" != "$VERSION" ]; then
            echo "Syncing version: $CURRENT_VERSION -> $VERSION"
            
            # package.json のバージョンを置換
            sed -i "s/\"version\": \"$CURRENT_VERSION\"/\"version\": \"$VERSION\"/" package.json
            
            # bun.lock を更新
            bun install
            
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json bun.lock
            git commit -m "chore: sync version to $VERSION from PR title"
            git push
          else
            echo "Version is already in sync ($CURRENT_VERSION)"
          fi
